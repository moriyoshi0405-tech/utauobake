<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>うたうおばけ</title>

<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Zen Kaku Gothic New',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
height:480px;
background:white;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
box-sizing:border-box;
position:relative;
}

.dots{
position:absolute;
top:14px;
display:flex;
gap:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ddd;
}

.dot.active{
background:black;
}

.text{
font-size:20px;
line-height:1.6;
opacity:0;
transform:translateY(10px);
transition:.7s;
}

.text.show{
opacity:1;
transform:translateY(0);
}

.big{
font-size:24px;
font-weight:700;
}

.quote{
font-size:18px;
font-style:italic;
}

.book{
display:none;
flex-direction:column;
align-items:center;
}

.book img{
width:150px;
border-radius:6px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.title{
margin-top:10px;
font-weight:700;
}

.author{
font-size:13px;
opacity:.6;
}

.button{
margin-top:12px;
padding:10px 18px;
border-radius:20px;
background:black;
color:white;
text-decoration:none;
font-size:13px;
font-weight:700;
}

.replay{
margin-top:10px;
font-size:13px;
cursor:pointer;
opacity:.7;
}

.replay:hover{
opacity:1;
}

</style>

</head>

<body>

<div class="card">

<div class="dots" id="dots"></div>

<div id="text" class="text"></div>

<div id="book" class="book">

<img src="https://images-na.ssl-images-amazon.com/images/P/4065328772.jpg">

<div class="title">うたうおばけ</div>

<div class="author">くどう れいん</div>

<a class="button"
href="https://aged-trouser-c00.notion.site/305f89d90a6380b48cc0d354d6b04ae3"
target="_blank">

感想記事を読む

</a>

<div class="replay" onclick="restartReel()">

▶ もう一度見る

</div>

</div>

</div>

<script>

const scenes=[

`<div class="big">こんなに笑った<br>エッセイは初めて</div>`,
`ウソみたいな本当の話`,
`<div class="quote">「なんでこいつは女と<br>別れると分かっている日に<br>薄紫の丸眼鏡のサングラスを<br>つけることができるのだろう」</div>`,
`<div class="quote">「TPOがおしまい、<br>TPOよ、ああ、TPO」<br><br>本著からの引用</div>`,
`<div class="quote">「アホというのは<br>タフのことで、<br>この青年は底抜けにタフなのだろう」</div>`,
`<div class="big">人間って<br>おもしろい</div>`

]

let index=0

const text=document.getElementById("text")
const book=document.getElementById("book")
const dotsContainer=document.getElementById("dots")

let interval

scenes.forEach(()=>{

const dot=document.createElement("div")
dot.classList.add("dot")
dotsContainer.appendChild(dot)

})

const dots=document.querySelectorAll(".dot")

function updateDots(){

dots.forEach((d,i)=>{

d.classList.toggle("active",i<=index)

})

}

function showScene(){

if(index < scenes.length){

book.style.display="none"
text.style.display="block"

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML=scenes[index]

text.classList.add("show")

updateDots()

index++

},200)

}else{

text.style.display="none"
book.style.display="flex"

clearInterval(interval)

}

}

function restartReel(){

index=0
book.style.display="none"

interval=setInterval(showScene,3000)

showScene()

}

showScene()

interval=setInterval(showScene,3000)

</script>

</body>
</html>
