<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Noto Serif JP',serif;
overflow:hidden;
background:#f5efe6;
}

.container{
height:100vh;
width:100vw;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px;
box-sizing:border-box;
position:relative;
}

/* 背景 */

.bg{
position:absolute;
top:0;
left:0;
width:110%;
height:110%;
background:url("https://images.unsplash.com/photo-1512820790803-83ca734da794") center/cover;
filter:blur(6px) brightness(0.9);
z-index:-1;
animation:zoom 25s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

.text{
max-width:700px;
font-size:28px;
line-height:1.8;
opacity:0;
transform:translateY(30px);
transition:all 1.2s;
margin-bottom:30px;
}

.text.show{
opacity:1;
transform:translateY(0);
}

.big{
font-size:38px;
font-weight:700;
}

.quote{
font-style:italic;
font-size:22px;
}

.title{
font-size:44px;
letter-spacing:6px;
margin-top:10px;
}

.book{
margin-top:20px;
opacity:0;
transform:scale(.8);
transition:all 1.6s;
}

.book.show{
opacity:1;
transform:scale(1);
}

.book img{
width:220px;
border-radius:6px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
}

/* ボタン */

.button{
margin-top:30px;
padding:14px 28px;
background:#111;
color:white;
border-radius:40px;
text-decoration:none;
font-weight:700;
letter-spacing:1px;
transition:.3s;
}

.button:hover{
transform:scale(1.05);
background:#333;
}

@media(max-width:600px){

.text{font-size:20px;}
.big{font-size:28px;}
.title{font-size:30px;}
.book img{width:160px;}

}

</style>
</head>

<body>

<div class="container">

<div class="bg"></div>

<div id="text" class="text"></div>

<div id="book" class="book">
<img src="https://m.media-amazon.com/images/I/615m1SL9wIL._SL1428_.jpg">
<div class="title">うたうおばけ</div>
<div>くどうれいん</div>
</div>

<a class="button" href="https://あなたのNotion記事URL" target="_blank">
感想記事を読む
</a>

</div>

<script>

const scenes=[

`<div class="big">こんなに笑ったエッセイ、初めてかもしれない。</div>`,

`日常は、退屈だと思っていた。<br><br>
でもある人の視点を通すと<br>
それは突然、舞台になる。`,

`<div class="quote">
TPOがおしまい、TPOよ、ああ、TPO
</div>`,

`TPOおしまい男。`,

`底抜けにタフなハシノ。`,

`くどうれいんの言葉は<br><br>
日常を、コメディに変える。`,

`<div class="big">人って、やっぱりおもしろい。</div>`,

`<div class="big">うたうおばけ</div>`

]

let index=0
const text=document.getElementById("text")
const book=document.getElementById("book")

function showScene(){

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML=scenes[index]
text.classList.add("show")

if(index==scenes.length-1){
book.classList.add("show")
}

index++

if(index>=scenes.length){
index=0
book.classList.remove("show")
}

},600)

}

showScene()

setInterval(showScene,4200)

</script>

</body>
</html>
